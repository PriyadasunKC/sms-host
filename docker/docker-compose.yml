version: '3'
services:
  client:
    build:
      context: ..
      dockerfile: docker/Dockerfile-client
    ports:
      - "80:80"
    depends_on:
      - server

  server:
    build:
      context: ..
      dockerfile: docker/Dockerfile-server
    ports:
      - "5000:5000"
    environment:
      - NODE_ENV=production